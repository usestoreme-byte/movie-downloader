name: Movie Downloader
on:
  workflow_dispatch:  # manual trigger

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install gspread google-auth pymediainfo requests requests-toolbelt
      - run: sudo apt-get update && sudo apt-get install -y aria2 mediainfo
      - name: Run Movie Downloader
        env:
          GOOGLE_SHEETS_JSON: ${{ secrets.GOOGLE_SHEETS_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          VIDARA_API_KEY: ${{ secrets.VIDARA_API_KEY }}
          BEAM_ADMIN_EMAIL: ${{ secrets.BEAM_ADMIN_EMAIL }}
          BEAM_ADMIN_PASSWORD: ${{ secrets.BEAM_ADMIN_PASSWORD }}
        run: python movie-downloader.py
